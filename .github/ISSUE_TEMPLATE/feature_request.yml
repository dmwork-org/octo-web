name: 💡 Feature Request
description: 提出新功能建议
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述清楚需求背景和期望方案。
  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 你遇到了什么问题，或者为什么需要这个功能？
      placeholder: 搜索结果无法按时间排序，很难找到最近的消息
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望怎么解决？
      placeholder: 搜索结果增加「按时间排序」选项
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过其他方案吗？
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: 涉及组件
      options:
        - 会话/聊天 (Conversation)
        - 消息列表 (MessageList)
        - 消息输入 (MessageInput)
        - 全局搜索 (GlobalSearch)
        - 联系人 (Contacts)
        - 群设置 (ChannelSetting)
        - 登录/注册 (Login)
        - 其他
    validations:
      required: true
  - type: textarea
    id: technical
    attributes:
      label: 技术方案（可选）
      description: 如有初步想法：涉及哪些模块、组件变更等
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 原型图、参考链接、相关 Issue 等
    validations:
      required: false
